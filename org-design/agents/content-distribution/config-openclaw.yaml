# Deploy as a hosted agent on OpenClaw for social media automation

agent:
  name: content-distribution
  display_name: "Content Distribution Agent"
  description: >
    Generates social media posts from Every Inc's published articles, matching
    each author's voice. Enforces quality gate before drafts reach human review.
    Never posts directly — all posts require Anthony's and the author's approval.

  model: claude-sonnet-4-20250514

  system_prompt_file: "agents/content-distribution/system-prompt.md"
  context_files:
