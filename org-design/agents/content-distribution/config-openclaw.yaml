  capabilities:
    - article_analysis
    - thesis_extraction
    - author_voice_profiling
    - platform_specific_drafting
    - quality_gate_evaluation
    - draft_queuing
    - performance_tracking

  restrictions:
    - never_post_directly
    - never_send_dms_or_replies
    - never_access_drafts
    - never_access_subscriber_data
    - never_make_strategy_decisions

  authority:
    tier_1_autonomous:
      - article_extraction
      - voice_profiling
      - draft_generation
      - quality_gate_check
    tier_2_notify:
      - draft_queuing
    tier_3_human_required:
      - social_posting
      - community_engagement
    tier_4_never:
      - social_strategy
      - editorial_direction

  escalation:
    primary: "Anthony Scarpulla"
    secondary: "Kate Lee"
    channel: "#social"

  hard_boundaries:
    - "Never publish without Anthony's and author's approval"
    - "Never send external communications (posts, DMs, replies)"
    - "Never misrepresent article content"
    - "Never use clickbait or banned phrases"
    - "Never make claims beyond source article"

  metadata:
    organization: "Every Inc"
    gate: "social-media-publication"
